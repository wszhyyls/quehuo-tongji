<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>微山县众和医药连锁有限公司 药品订购系统 - 登录</title>

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./static/icon-192.png">
    <meta name="theme-color" content="#667eea">

    <link rel="stylesheet" href="./static/css/style.css?v=23">
    <script src="./static/js/utils.js?v=23"></script>
    <style>
        .login-mode-switch {
            display: flex;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .mode-btn {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            background: #f5f5f5;
            color: #666;
            font-size: 14px;
            transition: all 0.3s;
            user-select: none;
        }
        .mode-btn.active {
            background: #2196f3;
            color: white;
            font-weight: bold;
        }
        .login-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }
        .login-input:focus {
            border-color: #2196f3;
        }
    </style>
</head>
<body class="login-page" data-theme="blue">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="./static/logo.jpg" alt="LOGO" class="login-logo">
                <span class="login-company">微山县众和医药连锁有限公司</span>
            </div>
            <h1 class="login-system">药品订购系统</h1>

            <!-- 登录模式切换 -->
            <div class="login-mode-switch">
                <span class="mode-btn active" data-mode="employee">员工登录</span>
                <span class="mode-btn" data-mode="admin">管理员登录</span>
            </div>

            <form id="loginForm" onsubmit="return false;">
                <!-- 员工登录：门店下拉选择 -->
                <div class="form-group" id="storeGroup">
                    <label>选择门店</label>
                    <select id="storeSelect" class="login-select">
                        <option value="">-- 请选择门店 --</option>
                        <option value="wszhyy02">02第二药店</option>
                        <option value="wszhyy03">03第三药店</option>
                        <option value="wszhyy04">04第四药店</option>
                        <option value="wszhyy06">06常口店</option>
                        <option value="wszhyy08">08第八药店</option>
                        <option value="wszhyy09">09第九药店</option>
                        <option value="wszhyy14">14第十四药店</option>
                        <option value="wszhyy16">16凤凰山药店</option>
                        <option value="wszhyy17">17益丰店</option>
                        <option value="wszhyy21">21富源店</option>
                    </select>
                </div>

                <!-- 员工登录：账号下拉选择 -->
                <div class="form-group" id="accountGroup">
                    <label>选择账号</label>
                    <select id="accountSelect" class="login-select">
                        <option value="">-- 请先选择门店 --</option>
                    </select>
                </div>

                <!-- 管理员登录：用户名输入 -->
                <div class="form-group" id="adminUsernameGroup" style="display:none;">
                    <label>用户名</label>
                    <input type="text" id="adminUsernameInput" class="login-input" placeholder="请输入用户名" autocomplete="username">
                </div>

                <!-- 密码框 -->
                <div class="form-group" id="passwordGroup">
                    <label>密码</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="passwordInput"
                            placeholder="请输入密码"
                            autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle" title="显示密码">
                            👁
                        </button>
                    </div>
                </div>

                <!-- 记住密码 -->
                <div class="form-group remember-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberPassword">
                        <span>记住密码</span>
                    </label>
                </div>

                <button type="button" class="btn-login" id="loginBtn">登 录</button>
            </form>

            <div id="error" class="error-message" style="display:none;"></div>
            <div id="loading" style="display:none;margin-top:15px;color:#666;text-align:center;font-size:14px;">
                <span style="display:inline-block;animation:spin 1s linear infinite;">&#8987;</span> 正在验证...
            </div>
            
            <div class="version-info">V3.18.7</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://qswpgnnedqvuegwfbprd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzd3Bnbm5lZHF2dWVnd2ZicHJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3Mjc0NjEsImV4cCI6MjA5NDMwMzQ2MX0.mY_nlWoHc5UYDHB9jOif0zkYJ2OVx79KTgejcSGkhBI";

        let supabaseClient = null;
        let isLoggingIn = false;

        // ========== 门店账号映射数据 ==========
        // 每个门店对应的实际账号列表
        const STORE_ACCOUNTS = {
            'admin': [
                { value: 'admin', label: 'admin（管理员）' }
            ],
            'wszhyy02': [
                { value: 'wszhyy02', label: 'wszhyy02' },
                { value: '15305479520', label: '15305479520' }
            ],
            'wszhyy03': [
                { value: 'wszhyy03', label: 'wszhyy03' }
            ],
            'wszhyy04': [
                { value: 'wszhyy04', label: 'wszhyy04' }
            ],
            'wszhyy06': [
                { value: 'wszhyy06', label: 'wszhyy06' }
            ],
            'wszhyy08': [
                { value: 'wszhyy08', label: 'wszhyy08' }
            ],
            'wszhyy09': [
                { value: 'wszhyy09', label: 'wszhyy09' }
            ],
            'wszhyy14': [
                { value: 'wszhyy14', label: 'wszhyy14' }
            ],
            'wszhyy16': [
                { value: 'wszhyy16', label: 'wszhyy16' }
            ],
            'wszhyy17': [
                { value: 'wszhyy17', label: 'wszhyy17' }
            ],
            'wszhyy21': [
                { value: 'wszhyy21', label: 'wszhyy21' }
            ]
        };

        window.onload = function() {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                var storeSelect = document.getElementById('storeSelect');
                var accountSelect = document.getElementById('accountSelect');
                var passwordEl = document.getElementById('passwordInput');

                // ========== 设备检测：后台静默运行，不阻塞用户操作 ==========
                var deviceCheckDone = false;
                var deviceCheckResult = null;
                
                async function checkDeviceStores() {
                    // 超时保护：5秒后放弃等待
                    var controller = new AbortController();
                    var timeoutId = setTimeout(function() { controller.abort(); }, 5000);
                    
                    try {
                        var deviceId = getDeviceId();
                        console.log('[设备检测] 当前设备ID:', deviceId);
                        
                        var resp = await fetch(SUPABASE_URL + '/functions/v1/query-shortage-data', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                            },
                            body: JSON.stringify({
                                action: 'check_device_stores',
                                params: { device_id: deviceId }
                            }),
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);
                        var result = await resp.json();
                        
                        if (result.success && result.data && result.data.stores && result.data.stores.length > 0) {
                            var boundStores = result.data.stores;
                            console.log('[设备检测] 设备已绑定门店:', boundStores);
                            
                            // 锁死门店选择：只显示已绑定的门店
                            var allStoreOpts = storeSelect.querySelectorAll('option');
                            allStoreOpts.forEach(function(opt) {
                                var storeValue = opt.value;
                                if (!storeValue) return;
                                var isBound = boundStores.some(function(s) { return s.username === storeValue; });
                                if (!isBound) {
                                    opt.disabled = true;
                                    opt.style.display = 'none';
                                }
                            });
                            
                            // 保存结果供登录恢复使用
                            deviceCheckResult = boundStores;
                            
                            // 添加上次登录匹配检查：如果lastStore也在绑定列表里，优先选它
                            var lastStore = localStorage.getItem('lastStore');
                            var matchedStore = null;
                            if (lastStore) {
                                var isLastBound = boundStores.some(function(s) { return s.username === lastStore; });
                                if (isLastBound) matchedStore = lastStore;
                            }
                            
                            // 检查当前用户是否已经选了门店（可能通过恢复上次记录已选）
                            var currentStore = storeSelect.value;
                            var shouldChange = false;
                            if (!currentStore) {
                                shouldChange = true;
                            } else {
                                // 当前选的门店不在绑定列表中，需要切换
                                var isCurrentBound = boundStores.some(function(s) { return s.username === currentStore; });
                                if (!isCurrentBound) shouldChange = true;
                            }
                            
                            if (shouldChange) {
                                // 默认选中匹配的门店或第一个绑定的门店
                                var defaultStore = matchedStore || boundStores[0].username;
                                if (storeSelect.value !== defaultStore) {
                                    storeSelect.value = defaultStore;
                                    storeSelect.dispatchEvent(new Event('change'));
                                } else {
                                    // 值相同也要触发change确保账号列表刷新
                                    storeSelect.dispatchEvent(new Event('change'));
                                }
                            }
                            
                            // 添加锁标志 + 提示
                            var storeLabel = storeSelect.parentElement.querySelector('label');
                            if (storeLabel) {
                                if (boundStores.length > 1) {
                                    storeLabel.innerHTML = '选择门店 🔒<span style="font-size:10px;color:#4CAF50;margin-left:6px;">（绑定 ' + boundStores.length + ' 家）</span>';
                                } else {
                                    storeLabel.innerHTML = '选择门店 🔒<span style="font-size:10px;color:#4CAF50;margin-left:6px;">（已绑定）</span>';
                                }
                            }
                        }
                    } catch(e) {
                        console.log('[设备检测] 查询失败或超时，使用完整门店列表:', e.message || e);
                    } finally {
                        deviceCheckDone = true;
                    }
                }
                
                // 启动设备检测（后台静默运行，不阻塞页面）
                checkDeviceStores();

                // 门店选择变化时更新账号列表并清空密码
                storeSelect.addEventListener('change', function() {
                    var storeValue = this.value;
                    accountSelect.innerHTML = '<option value="">-- 请选择账号 --</option>';
                    accountSelect.value = ''; // 重置账号选择
                    passwordEl.value = ''; // 清空密码
                    document.getElementById('rememberPassword').checked = false;
                    
                    if (storeValue && STORE_ACCOUNTS[storeValue]) {
                        accountSelect.disabled = false;
                        STORE_ACCOUNTS[storeValue].forEach(function(acc) {
                            var option = document.createElement('option');
                            option.value = acc.value;
                            option.textContent = acc.label;
                            accountSelect.appendChild(option);
                        });
                        // 如果只有一个账号，自动选中并聚焦密码框
                        if (STORE_ACCOUNTS[storeValue].length === 1) {
                            accountSelect.value = STORE_ACCOUNTS[storeValue][0].value;
                            accountSelect.dispatchEvent(new Event('change'));
                        }
                    } else {
                        accountSelect.disabled = true;
                        accountSelect.innerHTML = '<option value="">-- 请先选择门店 --</option>';
                    }
                });
                
                // 账号选择变化时清空密码
                accountSelect.addEventListener('change', function() {
                    passwordEl.value = ''; // 清空密码
                    document.getElementById('rememberPassword').checked = false;
                    
                    // 如果当前账号有记住的密码，自动填充
                    if (this.value) {
                        var storeValue = storeSelect.value;
                        var savedPwd = localStorage.getItem('savedPassword_' + storeValue + '_' + this.value);
                        var rememberPwd = localStorage.getItem('rememberPassword_' + storeValue + '_' + this.value) === 'true';
                        
                        if (rememberPwd && savedPwd) {
                            passwordEl.value = savedPwd;
                            document.getElementById('rememberPassword').checked = true;
                            // 密码自动填充后聚焦登录按钮
                            setTimeout(function() { 
                                document.getElementById('loginBtn').focus(); 
                            }, 50);
                        } else {
                            // 没有记住密码时，聚焦到密码输入框
                            focusPasswordInput();
                        }
                    }
                });
                
                // 确保密码框获得焦点的函数
                function focusPasswordInput() {
                    // 先移除可能阻碍焦点的属性
                    passwordEl.removeAttribute('disabled');
                    passwordEl.removeAttribute('readonly');
                    passwordEl.style.display = '';
                    passwordEl.style.pointerEvents = 'auto';
                    
                    // 延迟聚焦，避免与select的blur冲突导致无法输入
                    setTimeout(function() {
                        passwordEl.focus();
                    }, 150);
                }
                
                // 密码显示/隐藏切换
                document.getElementById('passwordToggle').addEventListener('click', function() {
                    if (passwordEl.type === 'password') {
                        passwordEl.type = 'text';
                        this.textContent = '🙈';
                        this.title = '隐藏密码';
                    } else {
                        passwordEl.type = 'password';
                        this.textContent = '👁';
                        this.title = '显示密码';
                    }
                });

                // ========== 恢复上次登录记录和记住的密码（延迟执行，等待设备检测完成）==========
                setTimeout(function() {
                    var lastStore = localStorage.getItem('lastStore');
                    var lastAccount = localStorage.getItem('lastAccount');
                    
                    // 检查lastStore是否在当前可选门店中（可能被设备锁过滤了）
                    if (lastStore) {
                        var storeOpt = storeSelect.querySelector('option[value="' + lastStore + '"]');
                        if (!storeOpt || storeOpt.disabled) {
                            // lastStore被设备绑锁定过滤了，使用当前已选门店
                            lastStore = storeSelect.value;
                        }
                    }
                    
                    if (lastStore && STORE_ACCOUNTS[lastStore]) {
                        var needChange = (storeSelect.value !== lastStore);
                        if (needChange) {
                            storeSelect.value = lastStore;
                            storeSelect.dispatchEvent(new Event('change'));
                        }
                        
                        // 延时设置账号（等待账号列表加载）
                        setTimeout(function() {
                            if (lastAccount) {
                                // 检查账号是否存在
                                var accOpt = accountSelect.querySelector('option[value="' + lastAccount + '"]');
                                if (accOpt) {
                                    accountSelect.value = lastAccount;
                                    
                                    // 如果记住密码，自动填充密码
                                    var savedPassword = localStorage.getItem('savedPassword_' + lastStore + '_' + lastAccount);
                                    var rememberPassword = localStorage.getItem('rememberPassword_' + lastStore + '_' + lastAccount) === 'true';
                                    
                                    if (rememberPassword && savedPassword) {
                                        document.getElementById('passwordInput').value = savedPassword;
                                        document.getElementById('rememberPassword').checked = true;
                                        // 密码自动填充后聚焦登录按钮
                                        setTimeout(function() {
                                            document.getElementById('loginBtn').focus();
                                        }, 50);
                                    } else {
                                        focusPasswordInput();
                                    }
                                }
                            } else {
                                focusPasswordInput();
                            }
                        }, 60);
                    }
                }, 200);

                // 登录模式切换
                var modeBtns = document.querySelectorAll('.mode-btn');
                modeBtns.forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        modeBtns.forEach(function(b) { b.classList.remove('active'); });
                        this.classList.add('active');
                        var mode = this.dataset.mode;
                        if (mode === 'admin') {
                            document.getElementById('storeGroup').style.display = 'none';
                            document.getElementById('accountGroup').style.display = 'none';
                            document.getElementById('adminUsernameGroup').style.display = '';
                            document.getElementById('adminUsernameInput').focus();
                        } else {
                            document.getElementById('storeGroup').style.display = '';
                            document.getElementById('accountGroup').style.display = '';
                            document.getElementById('adminUsernameGroup').style.display = 'none';
                        }
                        passwordEl.value = '';
                        document.getElementById('rememberPassword').checked = false;
                        hideError();
                    });
                });

                // 登录按钮
                document.getElementById('loginBtn').addEventListener('click', handleLogin);

                // 回车快捷键
                passwordEl.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') handleLogin();
                });
                document.getElementById('adminUsernameInput').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') handleLogin();
                });
            } catch (e) {
                alert('初始化失败: ' + e.message);
            }
        };

        // ========== 登录处理 ==========
        async function handleLogin() {
            if (isLoggingIn) return;
            var isAdminMode = document.querySelector('.mode-btn.active').dataset.mode === 'admin';
            var account, password, store = null;

            if (isAdminMode) {
                account = document.getElementById('adminUsernameInput').value;
                password = document.getElementById('passwordInput').value;
                if (!account) { showError('请输入用户名'); return; }
            } else {
                store = document.getElementById('storeSelect').value;
                account = document.getElementById('accountSelect').value;
                password = document.getElementById('passwordInput').value;
                if (!store) { showError('请选择门店'); return; }
                if (!account) { showError('请选择账号'); return; }
            }
            if (!password) { showError('请输入密码'); return; }

            isLoggingIn = true; showLoading(true); hideError();

            try {
                var deviceId = getDeviceId();
                var response = await fetch(SUPABASE_URL + '/functions/v1/query-shortage-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        action: 'store_login',
                        params: { username: account, password: password, device_id: deviceId }
                    })
                });
                var result = await response.json();

                if (!result.success || !result.data) {
                    if (result.pending_device_id) {
                        var errMsg = result.error || '该设备未授权，请联系管理员授权后使用';
                        if (result.bound_to) {
                            errMsg += '\n\n当前设备被账号「' + result.bound_to + '」绑定，已自动提交重新授权申请，请等待管理员处理。';
                        }
                        throw new Error(errMsg);
                    }
                    throw new Error(result.error || '登录失败');
                }

                var loginData = result.data;
                localStorage.setItem('token', loginData.session.access_token);
                localStorage.setItem('user', JSON.stringify(loginData.user));

                // 保存本次登录信息
                if (!isAdminMode) {
                    localStorage.setItem('lastStore', store);
                    localStorage.setItem('lastAccount', account);
                }

                // 保存或清除记住的密码
                var rememberChecked = document.getElementById('rememberPassword').checked;
                var currentPassword = document.getElementById('passwordInput').value;
                var passwordKey, rememberKey;
                if (isAdminMode) {
                    passwordKey = 'savedPassword_admin_' + account;
                    rememberKey = 'rememberPassword_admin_' + account;
                } else {
                    passwordKey = 'savedPassword_' + store + '_' + account;
                    rememberKey = 'rememberPassword_' + store + '_' + account;
                }

                if (rememberChecked && currentPassword) {
                    localStorage.setItem(passwordKey, currentPassword);
                    localStorage.setItem(rememberKey, 'true');
                } else {
                    localStorage.removeItem(passwordKey);
                    localStorage.setItem(rememberKey, 'false');
                }

                showLoading(false);
                var adminRoles = ['admin', 'super_admin'];
                window.location.href = adminRoles.indexOf(loginData.user.role) >= 0 ? './admin.html' : './store.html';
            } catch (err) {
                showLoading(false);
                showError(err.message);
            } finally {
                isLoggingIn = false;
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            var btn = document.getElementById('loginBtn');
            btn.disabled = show;
            btn.style.opacity = show ? '0.6' : '1';
        }
        function showError(msg) {
            var el = document.getElementById('error');
            el.textContent = msg; el.style.display = 'block';
        }
        function hideError() { document.getElementById('error').style.display = 'none'; }
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./static/sw.js')
            .then((registration) => {
              console.log('✅ Service Worker registered:', registration.scope);
            })
            .catch((error) => {
              console.log('❌ Service Worker registration failed:', error);
            });
        });
      }
    </script>
</body>
