name: Deploy to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Deploy Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WRANGLER_CF_API_TOKEN: ${{ secrets.WRANGLER_CF_API_TOKEN }}
          BCRYPT_PASSWORD: ${{ secrets.BCRYPT_PASSWORD }}
        run: npx wrangler deploy supabase/functions/query-shortage-data/index.ts --force
        
      - name: Deploy to Cloudflare Pages
        env:
          WRANGLER_CF_API_TOKEN: ${{ secrets.WRANGLER_CF_API_TOKEN }}
        run: npx wrangler pages deploy deploy/ --project-name=缺货统计系统
