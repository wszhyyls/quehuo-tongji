name: Deploy to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # NOTE: Supabase Edge Functions 需要手动部署（缺少 SUPABASE_ACCESS_TOKEN）
      # 部署方式：本地运行 "npx supabase functions deploy" 或 Supabase Dashboard
      # 前端自动部署到 Cloudflare Pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.WRANGLER_CF_API_TOKEN }}
          accountId: 4826d39607b18e6550ec349d1bd3f7f1
          projectName: wszhhyy
          directory: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
