name: Deploy to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy Edge Functions
        run: npx supabase functions deploy query-shortage-data --project-ref qswpgnnedqvuegwfbprd
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.WRANGLER_CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4826d39607b18e6550ec349d1bd3f7f1
        run: npx wrangler pages deploy deploy/ --project-name=wszhyy --branch=main
